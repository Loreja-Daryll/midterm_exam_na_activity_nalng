<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form onsubmit="submitform()"; return false;>
        <h1>Registration Form</h1>

        <label for="fullName">Full Name:</label>
        <input type="text" name="name" id="name" placeholder="Enter your Full Name" autocomplete="given-name">
  
        <label for="age">Age:</label>
        <input type="number" id="age" placeholder="Enter your Age">

        <label for="b-day">Birthday:</label>
        <input type="date" id="b-day">
 
        <label for="textArea">Address:</label>
        <textarea name="Textarea" id="textArea" placeholder="Enter your Address"></textarea>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Enter your Email" autocomplete="given-email">

        <input type="submit" value="Register">
    </form>
    
    <script>
        function submitform() {
            var name = document.getElementById("name"). value;
            var age = document.getElementById("age"). value;
            var birthday = document.getElementById("b-day"). value;
            var address = document.getElementById("textArea"). value;
            var email = document.getElementById("email"). value;

            if (name === "" || age === "" || birthday === "" || address === "" || email === "" ) {
                alert("Please fill out all the form")
                return false;
            }
            alert("Form submitted successfully! \nName:" + name + "\nAge:" + age + "\nBithday:" + birthday + "\nAddress:" + address + "\nEmail:" + email );
            
        }
    </script>
</body>
</html>
